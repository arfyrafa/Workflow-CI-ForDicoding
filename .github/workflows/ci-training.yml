name: CI Training Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  training:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn==1.5.2 pandas==2.2.3 numpy==2.1.3 mlflow==2.19.0 matplotlib==3.9.2 seaborn==0.13.2

      - name: Run MLProject Training
        run: |
          cd MLProject
          python modelling.py

      - name: Upload Training Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: |
            MLProject/artifacts/
            MLProject/mlruns/
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: training

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install MLflow
        run: |
          pip install mlflow==2.19.0

      - name: Build Docker Image
        run: |
          cd MLProject
          docker build -t wine-quality-model:latest -f Dockerfile .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and Push Docker Image
        run: |
          docker tag wine-quality-model:latest ${{ secrets.DOCKER_USERNAME }}/wine-quality-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/wine-quality-model:latest
